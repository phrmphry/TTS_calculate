<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เครื่องคำนวณราคาขาย TikTok Shop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Thai', sans-serif;
    font-size: 15px;
    color: #1a1a1a;
    background: #f5f5f3;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 16px;
    border: 1px solid #e0dfd8;
    padding: 2rem;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 1.75rem;
    color: #1a1a1a;
  }
  .sec-title {
    font-size: 11px;
    font-weight: 500;
    color: #888780;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 12px;
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .field-row label {
    font-size: 13px;
    color: #5f5e5a;
    min-width: 215px;
  }
  .field-row input[type="number"] {
    width: 110px;
    padding: 7px 10px;
    font-size: 14px;
    border: 1.5px solid #c8c7c0;
    border-radius: 8px;
    background: #ffffff;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-row input[type="number"]:hover { border-color: #888780; }
  .field-row input[type="number"]:focus { border-color: #378ADD; box-shadow: 0 0 0 3px #e6f1fb; }
  .field-row input[type="range"] {
    flex: 1;
    accent-color: #378ADD;
    cursor: pointer;
  }
  .unit { font-size: 12px; color: #888780; white-space: nowrap; }
  .val { font-size: 14px; font-weight: 500; min-width: 40px; text-align: right; color: #1a1a1a; }
  .highlight { font-size: 11px; color: #378ADD; }
  .note { font-size: 11px; color: #b4b2a9; margin: -4px 0 10px 0; line-height: 1.5; }
  hr { border: none; border-top: 1px solid #ebebeb; margin: 1.5rem 0; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
  .metric-card { background: #f5f5f3; border-radius: 10px; padding: 14px; }
  .metric-label { font-size: 11px; color: #888780; margin-bottom: 5px; }
  .metric-value { font-size: 22px; font-weight: 500; color: #1a1a1a; }
  .metric-value.ok { color: #0f6e56; }
  .metric-value.bad { color: #a32d2d; }

  .sec-title-sm { font-size: 11px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .breakdown { border: 1px solid #e0dfd8; border-radius: 12px; overflow: hidden; }
  .brow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 16px;
    font-size: 13px;
    border-bottom: 1px solid #ebebeb;
  }
  .brow:last-child { border-bottom: none; }
  .brow.subtotal { background: #f5f5f3; }
  .brow.profit-row { font-weight: 500; font-size: 14px; padding: 11px 16px; }
  .brow.profit-row.ok-row { background: #e1f5ee; }
  .brow.profit-row.bad-row { background: #fcebeb; }
  .bname { color: #5f5e5a; }
  .bname-strong { color: #1a1a1a; font-weight: 500; }
  .bamount-neutral { color: #1a1a1a; font-weight: 500; }
  .bamount-red { color: #a32d2d; }
  .bamount-subtotal { color: #a32d2d; font-weight: 500; }
  .bamount-green { color: #0f6e56; font-weight: 500; }
  .bamount-badprofit { color: #a32d2d; font-weight: 500; }

  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 999px;
    margin-left: 8px;
    font-weight: 400;
  }
  .tag-ok { background: #9fe1cb; color: #085041; }
  .tag-bad { background: #f7c1c1; color: #791f1f; }

  @media (max-width: 540px) {
    .field-row label { min-width: 150px; font-size: 12px; }
    .container { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>เครื่องคำนวณราคาขาย TikTok Shop</h1>

  <div style="margin-bottom:1.25rem">
    <div class="sec-title">ต้นทุนและกำไรที่ต้องการ</div>
    <div class="field-row">
      <label>ต้นทุนสินค้า</label>
      <input type="number" id="cost" value="100" min="1" step="1" oninput="calc()">
      <span class="unit">บาท</span>
    </div>
    <div class="field-row">
      <label>กำไรที่ต้องการ</label>
      <input type="range" id="profit-s" min="0" max="50" value="10" step="1" oninput="document.getElementById('profit-v').textContent=this.value+'%';calc()">
      <span class="val" id="profit-v">10%</span>
    </div>
  </div>

  <hr>

  <div style="margin-bottom:1.25rem">
    <div class="sec-title">ค่าส่ง</div>
    <div class="field-row">
      <label>ค่าส่งที่ลูกค้าจ่าย</label>
      <input type="number" id="ship" value="0" min="0" step="5" oninput="calc()">
      <span class="unit">บาท/ออเดอร์</span>
    </div>
    <p class="note">ค่าส่งจะรวมเป็นฐานคำนวณค่าธรรมเนียมการขาย 3.21% และ VAT</p>
  </div>

  <hr>

  <div style="margin-bottom:1.25rem">
    <div class="sec-title">ค่าธรรมเนียมแพลตฟอร์ม</div>
    <div class="field-row">
      <label>ค่าธรรมเนียมการขาย <span class="highlight">(P + ค่าส่ง)</span></label>
      <input type="number" id="f1" value="3.21" min="0" step="0.01" oninput="calc()">
      <span class="unit">%</span>
    </div>
    <div class="field-row">
      <label>ค่าคอมมิชชันหมวดหมู่</label>
      <input type="number" id="f2" value="7.49" min="0" step="0.01" oninput="calc()">
      <span class="unit">%</span>
    </div>
    <div class="field-row">
      <label>ค่าธรรมเนียมสนับสนุนการเติบโต</label>
      <input type="number" id="f3" value="8.03" min="0" step="0.01" oninput="calc()">
      <span class="unit">%</span>
    </div>
    <div class="field-row">
      <label>ค่าคอมมิชชันนายหน้า</label>
      <input type="number" id="f4" value="5.00" min="0" step="0.01" oninput="calc()">
      <span class="unit">%</span>
    </div>
    <div class="field-row">
      <label>ค่าโครงสร้างพื้นฐาน</label>
      <input type="number" id="infra" value="1.07" min="0" step="0.01" oninput="calc()">
      <span class="unit">บาท/ออเดอร์</span>
    </div>
  </div>

  <hr>

  <div style="margin-bottom:1.25rem">
    <div class="sec-title">ค่าใช้จ่ายอื่น</div>
    <div class="field-row">
      <label>% Ads ต่อยอดขายรวมทั้งร้าน</label>
      <input type="range" id="ads-s" min="0" max="30" value="15" step="1" oninput="document.getElementById('ads-v').textContent=this.value+'%';calc()">
      <span class="val" id="ads-v">15%</span>
    </div>
    <p class="note">VAT <span class="highlight">(P + ค่าส่ง)</span> คิดอัตรา 7/107 ≈ 6.54% บนฐานราคาขาย + ค่าส่ง</p>
  </div>

  <hr>

  <div class="metric-grid" id="metrics"></div>

  <div class="sec-title-sm" style="margin-bottom:8px">รายละเอียดต่อ 1 ออเดอร์</div>
  <div class="breakdown" id="breakdown"></div>
</div>

<script>
const VAT = 7/107;

function fmt(v){ return v.toFixed(2); }

function calc(){
  const cost   = parseFloat(document.getElementById('cost').value)||0;
  const tgt    = parseFloat(document.getElementById('profit-s').value)/100;
  const ship   = parseFloat(document.getElementById('ship').value)||0;
  const f1r    = parseFloat(document.getElementById('f1').value)/100||0;
  const f2r    = parseFloat(document.getElementById('f2').value)/100||0;
  const f3r    = parseFloat(document.getElementById('f3').value)/100||0;
  const f4r    = parseFloat(document.getElementById('f4').value)/100||0;
  const infra  = parseFloat(document.getElementById('infra').value)||0;
  const adsPct = parseFloat(document.getElementById('ads-s').value)/100;

  const onBase = f1r + VAT;
  const onP    = f2r + f3r + f4r + adsPct;
  const denom  = 1 - onBase - onP;
  const P = (cost*(1+tgt) + infra + onBase*ship) / denom;

  const base   = P + ship;
  const f1a    = base * f1r;
  const f2a    = P * f2r;
  const f3a    = P * f3r;
  const f4a    = P * f4r;
  const adsa   = P * adsPct;
  const vata   = base * VAT;
  const platT  = f1a+f2a+f3a+f4a+infra;
  const net    = P - cost - platT - adsa - vata;
  const markup = (P/cost - 1)*100;
  const margin = (net/P)*100;
  const isOk   = margin >= 0;

  document.getElementById('metrics').innerHTML = `
    <div class="metric-card"><div class="metric-label">ราคาขายที่ต้องตั้ง</div><div class="metric-value">${fmt(P)} ฿</div></div>
    <div class="metric-card"><div class="metric-label">Markup จากต้นทุน</div><div class="metric-value">${markup.toFixed(1)}%</div></div>
    <div class="metric-card"><div class="metric-label">กำไรสุทธิ/ออเดอร์</div><div class="metric-value ${isOk?'ok':'bad'}">${fmt(net)} ฿</div></div>
    <div class="metric-card"><div class="metric-label">Net margin</div><div class="metric-value ${isOk?'ok':'bad'}">${margin.toFixed(1)}%</div></div>
  `;

  const shipNote = ship>0 ? ` <span style="font-size:11px;color:#b4b2a9">(ฐาน ${fmt(base)} ฿)</span>` : '';
  const tag = isOk
    ? `<span class="tag tag-ok">กำไร</span>`
    : `<span class="tag tag-bad">ขาดทุน</span>`;
  const profitRowClass = isOk ? 'profit-row ok-row' : 'profit-row bad-row';
  const profitAmtClass = isOk ? 'bamount-green' : 'bamount-badprofit';

  document.getElementById('breakdown').innerHTML = `
    <div class="brow"><span class="bname">ราคาขาย (P)</span><span class="bamount-neutral">${fmt(P)} ฿</span></div>
    ${ship>0?`<div class="brow"><span class="bname">ค่าส่งที่ลูกค้าจ่าย</span><span class="bamount-neutral">${fmt(ship)} ฿</span></div>`:''}
    <div class="brow"><span class="bname">(-) ต้นทุนสินค้า</span><span class="bamount-red">−${fmt(cost)} ฿</span></div>
    <div class="brow"><span class="bname">(-) ค่าธรรมเนียมการขาย ${(f1r*100).toFixed(2)}%${shipNote}</span><span class="bamount-red">−${fmt(f1a)} ฿</span></div>
    <div class="brow"><span class="bname">(-) ค่าคอมมิชชันหมวดหมู่ ${(f2r*100).toFixed(2)}%</span><span class="bamount-red">−${fmt(f2a)} ฿</span></div>
    <div class="brow"><span class="bname">(-) ค่าธรรมเนียมสนับสนุนการเติบโต ${(f3r*100).toFixed(2)}%</span><span class="bamount-red">−${fmt(f3a)} ฿</span></div>
    <div class="brow"><span class="bname">(-) ค่าคอมมิชชันนายหน้า ${(f4r*100).toFixed(2)}%</span><span class="bamount-red">−${fmt(f4a)} ฿</span></div>
    <div class="brow"><span class="bname">(-) ค่าโครงสร้างพื้นฐาน</span><span class="bamount-red">−${fmt(infra)} ฿</span></div>
    <div class="brow subtotal"><span class="bname-strong">รวมค่าธรรมเนียมแพลตฟอร์ม</span><span class="bamount-subtotal">−${fmt(platT)} ฿</span></div>
    <div class="brow"><span class="bname">(-) ค่า Ads ${(adsPct*100).toFixed(0)}%</span><span class="bamount-red">−${fmt(adsa)} ฿</span></div>
    <div class="brow"><span class="bname">(-) VAT ≈6.54%${shipNote}</span><span class="bamount-red">−${fmt(vata)} ฿</span></div>
    <div class="brow ${profitRowClass}"><span class="bname-strong">กำไรสุทธิ ${tag}</span><span class="${profitAmtClass}">${fmt(net)} ฿</span></div>
  `;
}
calc();
</script>
</body>
</html>
